{% extends "base.html" %}

{% block content %}
<style>
    .auth-card {
        border-radius: 15px;
        background: #fff;
    }


   
</style>

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-lg-5">
                <h2 class="text-center mb-4">Welcome Back</h2>
                <p class="text-center text-secondary mb-4">Login to access your dashboard</p>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account? <a href="{% url 'notifications:signup' %}">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
