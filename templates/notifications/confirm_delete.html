{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="mb-3">Confirm Delete</h3>
                    <p class="text-secondary mb-4">
                        Are you sure you want to delete this record?
                    </p>
                    <div class="bg-light p-3 rounded-3 mb-4">
                        <strong>{{ object.customer_name }}</strong><br>
                        Invoice: {{ object.invoice_no }} | Amount: ₹{{ object.invoice_amount }}
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <a href="{% url 'notifications:dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
